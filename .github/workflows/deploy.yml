name: Deploy

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-southeast1
  SERVICE_NAME: llm-api
  MODEL_NAME: qwen3-8b-awq

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up Docker system
        run: docker system prune -af --volumes

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: gcr.io/${{ env.PROJECT_ID }}/llm-cloud-inference:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy service
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/llm-cloud-inference:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --gpu 1 \
            --gpu-type nvidia-l4 \
            --cpu 8 \
            --memory 32Gi \
            --timeout 3600 \
            --min-instances 0 \
            --max-instances 1 \
            --port 8080 \
            --cpu-boost \
            --no-cpu-throttling \
            --set-env-vars "MODEL_NAME=${{ env.MODEL_NAME }},GCS_BUCKET=${{ env.PROJECT_ID }}-models" \
            --service-account "llm-inference@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --startup-probe="tcpSocket.port=8080,initialDelaySeconds=120,timeoutSeconds=30,periodSeconds=30,failureThreshold=30" \
            --no-allow-unauthenticated

      - name: Setup IAM + Identity tokens security
        run: |
          # Create service account for client applications
          gcloud iam service-accounts create llm-client \
            --display-name="LLM API Client Application" \
            --project=${{ env.PROJECT_ID }} 2>/dev/null || true

          # Grant service account access to the API
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --member=serviceAccount:llm-client@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --role=roles/run.invoker \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

          echo "✓ Security setup complete"
          echo ""
          echo "Service deployed with IAM + Identity Tokens authentication enabled"
          echo "Service URL: https://$(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.REGION }} --format 'value(status.url)')"
          echo ""
          echo "To grant access to a user:"
          echo "  gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \\"
          echo "    --member=user:email@example.com \\"
          echo "    --role=roles/run.invoker \\"
          echo "    --region=${{ env.REGION }}"
          echo ""
          echo "To authenticate in Python:"
          echo "  import google.auth"
          echo "  from google.auth.transport.requests import Request"
          echo "  from openai import OpenAI"
          echo "  credentials, _ = google.auth.default()"
          echo "  credentials.refresh(Request())"
          echo "  client = OpenAI(base_url='https://your-url/v1', api_key='dummy',"
          echo "    default_headers={'Authorization': f'Bearer {credentials.id_token}'})"

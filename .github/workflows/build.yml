name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff

      - name: Run linter
        run: |
          ruff check scripts/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space (safe cleanup)
        run: |
          echo "Available disk space before cleanup:"
          df -h

          # Remove optional packages that don't have critical dependencies
          sudo apt-get update
          sudo apt-get remove -y \
            'dotnet*' 'powershell' 'julia' 'php*' 'mysql-server*' \
            2>/dev/null || true

          # Clean package cache
          sudo apt-get autoremove -y
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet /opt/hostedtoolcache

          echo "Available disk space after cleanup:"
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up Docker system before build
        run: |
          docker system prune -af --volumes
          docker rmi $(docker images -q) 2>/dev/null || true
          df -h

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: llm-cloud-inference:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Clean up after build
        if: always()
        run: |
          docker system prune -af --volumes
          docker rmi $(docker images -q) 2>/dev/null || true
          df -h
